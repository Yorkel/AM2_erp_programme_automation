# sources.yml — runtime registry of every source the pipeline scrapes.
#
# AUTO-GENERATED in part from data/sources_master.csv.
# Atlas entries are hand-tuned. RSS/alert entries are generated.
# Re-run scripts/generate_sources_yml.py to refresh after CSV edits.
#
# Each entry: name, type, scraper (module path), params (kwargs passed to scrape()).
# Set `disabled: true` to skip a source without deleting it.

sources:


