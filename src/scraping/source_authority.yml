# Source authority weights — used by src/inference/scoring.py
# Curator-editable: change a number, and the next pipeline run picks it up.
#
# Range: 0.0 (untrusted / off-scope) → 1.0 (highest authority).
# Used as one of five components in composite_score. See scoring.py.
#
# Sources NOT listed default to `_default` below.
#
# Add new entries by domain (e.g. "tes.com") or by the in-house source name
# (e.g. "schoolsweek"). Match is case-insensitive.

