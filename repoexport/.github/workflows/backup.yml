name: Daily Supabase backup → backups/

on:
  schedule:
    - cron: '0 23 * * *'    # Daily 23:00 UTC (~midnight UK)
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: write            # needed to commit the snapshot back to main

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase pandas python-dotenv

      - name: Dump tables to backups/<date>/
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.utils.backup_supabase

      - name: Commit + push snapshot
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name  "github-actions[bot]"
          git add backups/
          if git diff --cached --quiet; then
            echo "No changes to commit (tables unchanged since last backup)."
          else
            DATE=$(date -u +'%Y-%m-%d')
            git commit -m "backup: Supabase tables ${DATE}"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Backup run — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ''
            echo '```'
            ls -la backups/$(date -u +'%Y-%m-%d')/ 2>/dev/null || echo 'no backup dir for today'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
