name: Scrape sources → articles

on:
  schedule:
    # GitHub Actions cron uses UTC. Off-peak overnight slot to maximise the
    # chance scheduled runs actually fire on the free tier (peak skips runs).
    # During BST (Mar–Oct) this is 03:23 UK; during GMT (Nov–Feb) it's 02:23 UK.
    # Runs every weekday (Mon–Fri). The downstream chain (classify → drift →
    # fairness) follows automatically via workflow_run, so this is the only
    # schedule to change. The scraper is --since-last-run incremental, so daily
    # runs just ingest smaller deltas; no duplicate work. The :23 minute avoids
    # the top-of-hour stampede that GitHub deprioritises hardest.
    - cron: '23 2 * * 1-5'  # Every weekday 02:23 UTC = 03:23 UK (BST)
  workflow_dispatch:        # also allow manual triggering from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-warm classifier Space (fire-and-forget)
        # The HF classifier Space sleeps when idle and can take >60s to cold
        # start (it failed the classify run on 2026-06-22 this way). Ping /health
        # NOW, at the start of the scrape, so it wakes up during the minutes the
        # scrape takes and is warm by the time the chained classify job runs.
        # Best-effort: never fail the scrape if the warm-up doesn't land — the
        # classify step has its own hardened probe as the real backstop.
        if: always()
        continue-on-error: true
        env:
          CLASSIFIER_API_URL: ${{ secrets.CLASSIFIER_API_URL }}
          CLASSIFIER_API_KEY: ${{ secrets.CLASSIFIER_API_KEY }}
        run: |
          curl -fsS --max-time 150 --retry 4 --retry-all-errors --retry-delay 15 \
            -H "Authorization: Bearer ${CLASSIFIER_API_KEY}" \
            "${CLASSIFIER_API_URL%/}/health" && echo "Classifier Space warmed." \
            || echo "Warm-up did not land; classify step will cold-start it."

      - name: Run scraper (incremental — since last successful run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.scraping.run --since-last-run

      - name: Sweep null summaries + tags (safety net)
        if: always()
        continue-on-error: true   # sweep failure must NOT poison the downstream
                                  # classify→drift→fairness chain (they gate on
                                  # this workflow's conclusion). Scrape success
                                  # is the load-bearing signal; sweep is best-effort.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.scraping.sweep_summaries

      - name: Summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from dotenv import load_dotenv; load_dotenv()
          from src.scraping.supabase_client import get_client
          c = get_client()
          r = c.table('articles').select('id', count='exact').limit(1).execute()
          print(f'## articles total rows: {r.count}')
          " >> $GITHUB_STEP_SUMMARY
