name: Scrape sources → articles

on:
  schedule:
    # GitHub Actions cron uses UTC. UK times below are during BST (Mar–Oct);
    # during GMT (Nov–Feb) they fire 1 hour earlier in UK local time.
    - cron: '0 8 * * 2'    # Tue 08:00 UTC  = 09:00 UK (BST)
    - cron: '0 11 * * 4'   # Thu 11:00 UTC  = 12:00 UK (BST)
  workflow_dispatch:        # also allow manual triggering from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (incremental — since last successful run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.scraping.run --since-last-run

      - name: Summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from dotenv import load_dotenv; load_dotenv()
          from src.scraping.supabase_client import get_client
          c = get_client()
          r = c.table('articles').select('id', count='exact').limit(1).execute()
          print(f'## articles total rows: {r.count}')
          " >> $GITHUB_STEP_SUMMARY
