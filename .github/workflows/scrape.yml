name: Scrape sources → articles

on:
  # DAILY on weekdays — needed because RSS feeds only hold the latest few items
  # (e.g. Schools Week's feed shows ~3). A twice-weekly cadence let high-volume
  # sources, and the Thursday publishing peak, roll off the feed before being
  # scraped, so articles were silently lost. Daily capture catches each day's
  # items before they cycle out.
  #   - MONDAY  → triggered BY the "Weekly curator reset" finishing, so the scrape
  #     is GUARANTEED to run after the reset (no fragile cron timing).
  #   - TUE–FRI → cron, 02:23 UTC (03:23 UK BST), off-peak + :23 to dodge free-tier
  #     skips. (Weekends are low-volume, so no Sat/Sun run.)
  # Articles are CAPTURED daily but only SURFACE on the dashboard as a complete
  # Tue→Mon week (the UI shows the most-recently-completed week), so daily scraping
  # fills the week's bucket without changing the curators' one-week-at-a-time view.
  # Downstream classify → drift → fairness follows via workflow_run; the scraper is
  # --since-last-run incremental, so each daily run just ingests that day's delta.
  workflow_run:
    workflows: ["Weekly curator reset"]   # Monday: fire right after the reset
    types: [completed]
  schedule:
    - cron: '23 2 * * 2-5'                 # Tue–Fri 02:23 UTC = 03:23 UK (BST)
  workflow_dispatch:                       # manual trigger from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # When triggered by the reset finishing (Monday), only run if the reset
    # succeeded. The schedule (Tuesday) and manual dispatch always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-warm classifier Space (fire-and-forget)
        # The HF classifier Space sleeps when idle and can take >60s to cold
        # start (it failed the classify run on 2026-06-22 this way). Ping /health
        # NOW, at the start of the scrape, so it wakes up during the minutes the
        # scrape takes and is warm by the time the chained classify job runs.
        # Best-effort: never fail the scrape if the warm-up doesn't land — the
        # classify step has its own hardened probe as the real backstop.
        if: always()
        continue-on-error: true
        env:
          CLASSIFIER_API_URL: ${{ secrets.CLASSIFIER_API_URL }}
          CLASSIFIER_API_KEY: ${{ secrets.CLASSIFIER_API_KEY }}
        run: |
          curl -fsS --max-time 150 --retry 4 --retry-all-errors --retry-delay 15 \
            -H "Authorization: Bearer ${CLASSIFIER_API_KEY}" \
            "${CLASSIFIER_API_URL%/}/health" && echo "Classifier Space warmed." \
            || echo "Warm-up did not land; classify step will cold-start it."

      - name: Run scraper (incremental — since last successful run)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Enrichment uses OpenAI as PRIMARY on the runner, because the runner
          # cannot reliably reach Claude even via the Space proxy (June 2026
          # incidents). Claude stays as a best-effort fallback below.
          ENRICH_PROVIDER: openai
          # Route any Claude fallback calls through the HF Space, which CAN reach
          # Anthropic; the runner itself cannot (incident 2026-06-29). The
          # anthropic SDK picks up this base_url and posts to {url}/v1/messages.
          ANTHROPIC_BASE_URL: https://yorkel-erp-classifier.hf.space
          # Shared secret the Space proxy checks, so only this pipeline can use it.
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: python -m src.scraping.run --since-last-run

      - name: Sweep null summaries + tags (safety net)
        if: always()
        continue-on-error: true   # sweep failure must NOT poison the downstream
                                  # classify→drift→fairness chain (they gate on
                                  # this workflow's conclusion). Scrape success
                                  # is the load-bearing signal; sweep is best-effort.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Enrichment uses OpenAI as PRIMARY on the runner, because the runner
          # cannot reliably reach Claude even via the Space proxy (June 2026
          # incidents). Claude stays as a best-effort fallback below.
          ENRICH_PROVIDER: openai
          # Route any Claude fallback calls through the HF Space, which CAN reach
          # Anthropic; the runner itself cannot (incident 2026-06-29). The
          # anthropic SDK picks up this base_url and posts to {url}/v1/messages.
          ANTHROPIC_BASE_URL: https://yorkel-erp-classifier.hf.space
          # Shared secret the Space proxy checks, so only this pipeline can use it.
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: python -m src.scraping.sweep_summaries

      - name: Summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from dotenv import load_dotenv; load_dotenv()
          from src.scraping.supabase_client import get_client
          c = get_client()
          r = c.table('articles').select('id', count='exact').limit(1).execute()
          print(f'## articles total rows: {r.count}')
          " >> $GITHUB_STEP_SUMMARY
