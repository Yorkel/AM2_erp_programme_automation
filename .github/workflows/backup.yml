name: Daily Supabase backup → artifact

on:
  schedule:
    - cron: '0 23 * * *'    # Daily 23:00 UTC (~midnight UK)
  workflow_dispatch:        # manual trigger from Actions tab

permissions:
  contents: read             # backups are uploaded as artifacts, not committed

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase pandas python-dotenv

      - name: Dump tables to backups/<date>/
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.utils.backup_supabase

      - name: Upload snapshot as artifact (not committed to the repo)
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_id }}
          path: backups/
          retention-days: 90
          if-no-files-found: warn

      - name: Summary
        if: always()
        run: |
          {
            echo "## Backup run — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ''
            echo '```'
            ls -la backups/$(date -u +'%Y-%m-%d')/ 2>/dev/null || echo 'no backup dir for today'
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
