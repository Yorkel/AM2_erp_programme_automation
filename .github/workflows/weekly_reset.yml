name: Weekly curator reset

on:
  schedule:
    # GitHub Actions cron is UTC. Monday 01:17 UTC = 02:17 UK (BST) / 01:17 (GMT).
    # Off-peak overnight slot so the free tier reliably fires it — important now
    # that the Monday scrape is CHAINED to this workflow finishing (scrape.yml
    # workflow_run), so the scrape always runs AFTER the reset. Odd minute dodges
    # the top-of-hour stampede. Archives the previous week + starts fresh well
    # before the curator begins work Monday morning.
    - cron: '17 1 * * 1'   # Every Monday 01:17 UTC
  workflow_dispatch:        # manual "reset now" from the Actions tab

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Archive previous week + start new week
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.scraping.weekly_reset
