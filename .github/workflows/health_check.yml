name: Pipeline health check + self-heal

# The safety net behind the 2026-06-16 / 2026-06-22 incidents: the pipeline used
# to fail SILENTLY and a curator hit the broken dashboard before we knew. This
# workflow runs after the classifier, tries to self-heal the two known failure
# modes (unclassified articles, blank summaries), then verifies. If it's still
# broken, the job FAILS — which sends the standard GitHub failure email, so we
# find out, not the curators.

on:
  # Primary: run right after the classifier finishes (whether it passed or
  # failed — if it failed, this is exactly when we want to heal + alert).
  workflow_run:
    workflows: ["Classify pending articles → classify_newsletter"]
    types: [completed]
  # Backstop: in case the chain doesn't fire, run on the pipeline mornings
  # (Mon + Tue) at 06:00 UTC — after the runs, before curators start work.
  schedule:
    - cron: '0 6 * * 1,2'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pre-warm Claude proxy Space
        continue-on-error: true
        env:
          ANTHROPIC_BASE_URL: https://yorkel-erp-classifier.hf.space
        run: |
          BASE="${ANTHROPIC_BASE_URL%/}"
          curl -fsS --max-time 150 --retry 4 --retry-all-errors --retry-delay 15 \
            "$BASE/health" \
            && echo "Proxy Space warmed." \
            || echo "Proxy Space warm-up did not land."
          curl -fsS --max-time 30 --retry 2 --retry-all-errors --retry-delay 10 \
            "$BASE/claude_probe" \
            || echo "Claude probe did not land; summary sweep has OpenAI/local fallback."

      # ── Self-heal (best-effort; both are idempotent no-ops when clean) ──
      - name: Self-heal — classify any stragglers
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLASSIFIER_API_URL: ${{ secrets.CLASSIFIER_API_URL }}
          CLASSIFIER_API_KEY: ${{ secrets.CLASSIFIER_API_KEY }}
        run: python -m src.inference.sweep_unclassified

      - name: Self-heal — fill blank summaries + tags
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Route Claude through the HF Space (runner cannot reach Anthropic —
          # incident 2026-06-29). SDK reads this and posts to {url}/v1/messages.
          ANTHROPIC_BASE_URL: https://yorkel-erp-classifier.hf.space
          # Shared secret the Space proxy checks, so only this pipeline can use it.
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: python -m src.scraping.sweep_summaries

      # ── Verify (this step is the alarm: non-zero exit → GitHub failure email) ──
      - name: Verify this week is classified + summarised
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.monitoring.pipeline_health