name: Classify pending articles → classify_newsletter

on:
  workflow_run:
    workflows: ["Scrape sources → articles"]
    types: [completed]
  workflow_dispatch:        # also allow manual triggering

# Shared group with scrape/health so pipeline runs serialise on the DB (queue, not cancel).
concurrency:
  group: erp-pipeline
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if the upstream scrape succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run inference pipeline (retry once on cold-start)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Classifier deployed on Hugging Face Spaces. URL is public-ish, key
          # is the HF access token (needed because the Space is Private).
          CLASSIFIER_API_URL: ${{ secrets.CLASSIFIER_API_URL }}
          CLASSIFIER_API_KEY: ${{ secrets.CLASSIFIER_API_KEY }}
        # The pipeline is idempotent (upserts), so a clean re-run is safe. If the
        # first attempt fails on a still-cold Space, wait 60s (it's waking) and
        # try once more before failing the job.
        run: |
          # Scope the run to the current newsletter week (TUESDAY → TUESDAY): pull
          # + classify + cluster only articles since the most recent Tuesday,
          # instead of re-classifying the whole corpus every run. s07_pull reads
          # INFERENCE_SINCE. Near-duplicate clustering is then within-week, which
          # is what curators want. "last tuesday" = the Tuesday before today, so
          # it covers the open Tue→Tue cycle on both the Monday and Tuesday runs.
          export INFERENCE_SINCE=$(date -u -d "last tuesday" +%Y-%m-%d)
          echo "Classify window (Tue→Tue): article_date >= ${INFERENCE_SINCE}"
          for attempt in 1 2; do
            echo "::group::Inference attempt ${attempt}"
            if python src/pipeline.py --inference; then
              echo "::endgroup::"
              echo "Inference succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "::endgroup::"
            if [ "${attempt}" -eq 1 ]; then
              echo "Attempt 1 failed; waiting 60s for the Space to finish waking..."
              sleep 60
            fi
          done
          echo "Inference failed after 2 attempts."
          exit 1

      - name: Sweep any still-unclassified articles (safety net)
        # Catches articles missed by the main pipeline — single-article
        # /predict failures, HF Space cold-start timeouts, race with scrape.
        # Idempotent: no-op if everything is already classified.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLASSIFIER_API_URL: ${{ secrets.CLASSIFIER_API_URL }}
          CLASSIFIER_API_KEY: ${{ secrets.CLASSIFIER_API_KEY }}
        run: python -m src.inference.sweep_unclassified

      - name: Summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from dotenv import load_dotenv; load_dotenv()
          from src.scraping.supabase_client import get_client
          c = get_client()
          r = c.table('classify_newsletter').select('id', count='exact').limit(1).execute()
          print(f'## classify_newsletter total rows: {r.count}')
          " >> $GITHUB_STEP_SUMMARY
