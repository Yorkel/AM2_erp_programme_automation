name: Classify pending articles → classify_newsletter

on:
  workflow_run:
    workflows: ["Scrape sources → articles_topics"]
    types: [completed]
  workflow_dispatch:        # also allow manual triggering

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if the upstream scrape succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run inference pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python src/pipeline.py --inference

      - name: Summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from dotenv import load_dotenv; load_dotenv()
          from src.scraping.supabase_client import get_client
          c = get_client()
          r = c.table('classify_newsletter').select('id', count='exact').limit(1).execute()
          print(f'## classify_newsletter total rows: {r.count}')
          " >> $GITHUB_STEP_SUMMARY
