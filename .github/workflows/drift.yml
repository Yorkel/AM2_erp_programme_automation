name: Drift monitor → monitoring_log

on:
  workflow_run:
    workflows: ["Classify pending articles → classify_newsletter"]
    types: [completed]
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache SBERT weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: sbert-all-MiniLM-L6-v2

      # Baselines (class centroids + val distribution) are pre-computed locally
      # by src/classify/precompute_baselines.py and committed under
      # models/runs/<active>/. No CSVs needed at runtime — s09 just loads them.

      - name: Pull predictions from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.inference.pull_predictions

      - name: Run drift monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.inference.s09_monitor | tee drift_output.txt

      - name: Open issue on RED drift
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f drift_output.txt ] && grep -q "MONITOR STATUS: RED" drift_output.txt; then
            {
              echo "The weekly drift monitor flagged **RED** on $(date -u +'%Y-%m-%d %H:%M UTC')."
              echo
              echo "Review notebook 12 (§12 review surface) + the retrain-trigger check."
              echo
              echo '```'
              tail -45 drift_output.txt
              echo '```'
            } > issue_body.md
            gh issue create --title "RED drift alert - $(date -u +%F)" --body-file issue_body.md || echo "gh issue create failed"
          else
            echo "Drift status not RED - no issue opened."
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Drift run — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ''
            echo '```'
            if [ -f drift_output.txt ]; then tail -40 drift_output.txt; fi
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
